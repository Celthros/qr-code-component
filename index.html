<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<title>Frontend Mentor | QR code component</title>
</head>
<body>
<main class="qr-container">
	<figure class="qr-img">
		<img src="./images/image-qr-code.png" alt="QR code to Frontend Mentor" width="288" height="288">
	</figure>
	<div class="qr-content">
		<h1 class="mainheading">Improve your front-end skills by building projects</h1>

		<p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
	</div>

</main>
<footer class="attribution">
	<strong>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
		Coded by <a href="https://github.com/Celthros" target="_blank">Tyler</a>.</strong>
</footer>
</body>
</html>
